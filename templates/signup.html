<!DOCTYPE html>
<html>

<head>

<title>Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f3f4f6">

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-sm" style="width:380px">

<h4 class="text-center mb-3">Create Account</h4>

<form method="POST">

{% csrf_token %}

<input name="username" class="form-control mb-3" placeholder="Username" required>

<input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

<input type="password" name="password1" class="form-control mb-3" placeholder="Password" required>

<input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>

<button class="btn btn-dark w-100 mb-3">
Sign Up
</button>

</form>

<div class="text-center">

Already have an account?

<a href="{% url 'login' %}">Login</a>

</div>

</div>

</div>

</body>
</html>
