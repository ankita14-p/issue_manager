<div class="modal fade" id="issueModal" tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content custom-modal">

<div class="modal-header">

<h5 class="modal-title">Create New Issue</h5>

<button type="button" class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form method="POST" action="{% url 'create_issue' %}" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Title</label>

<input type="text" name="title" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea name="description" class="form-control textarea" rows="4" required></textarea>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">Severity</label>

<select name="severity" class="form-select" required>

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
<option value="Critical">Critical</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label">Status</label>

<select name="status" class="form-select" required>

<option value="Open">Open</option>


</select>

</div>

</div>

<div class="mt-3">

<label class="form-label">Assign Vendor</label>

<select name="assigned_to" class="form-select" required>

<option value="" disabled selected>Select Vendor</option>

{% for vendor in vendors %}
<option value="{{vendor.id}}">
{{vendor.name}}
</option>
{% endfor %}

</select>

</div>

<div class="mt-3">

<label class="form-label">Attachment</label>

<input type="file" name="attachment" class="form-control">

</div>

<button type="submit" class="btn btn-dark w-100 mt-4">
Create Issue
</button>

</form>

</div>

</div>

</div>

</div>
