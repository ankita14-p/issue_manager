{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Smart Issue Tracker</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- =========================
     NAVBAR
========================= -->

<header class="top-navbar">

<div class="nav-left">
    <h5 class="brand">Smart Issue Tracker</h5>
</div>

<nav class="nav-links">

<a href="{% url 'home' %}" class="nav-btn {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
Analytics
</a>

<a href="{% url 'vendors' %}" class="nav-btn {% if request.resolver_match.url_name == 'vendors' %}active{% endif %}">
Vendors
</a>

<a href="{% url 'dashboard' %}" class="nav-btn {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
Issues
</a>

<a href="{% url 'board' %}" class="nav-btn {% if request.resolver_match.url_name == 'board' %}active{% endif %}">
Board
</a>

<a href="{% url 'notifications' %}" class="nav-btn notif-link">
Notifications
<span id="notif-count" class="notif-badge"></span>
</a>

</nav>

<div class="nav-right">

<div class="user-pill">
{{user.username}}
</div>

<a href="{% url 'logout' %}" class="logout-pill">
Logout
</a>

</div>

</header>


<!-- =========================
     MAIN CONTENT
========================= -->

<main class="main-container">
{% block content %}{% endblock %}
</main>


<script>
function loadNotifications(){
fetch("/notifications/count/")
.then(res => res.json())
.then(data => {
let badge = document.getElementById("notif-count")
if(data.count > 0){
badge.style.display = "flex"
badge.innerText = data.count
}else{
badge.style.display = "none"
}
})
}
setInterval(loadNotifications,3000)
loadNotifications()
</script>

</body>
</html>
